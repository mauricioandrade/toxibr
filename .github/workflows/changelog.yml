name: Generate Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog from git log
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          tags=$(git tag --sort=-version:refname)

          prev=""
          for tag in $tags; do
            date=$(git log -1 --format=%ai "$tag" | cut -d ' ' -f 1)
            echo "## [$tag] — $date" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            if [ -z "$prev" ]; then
              prev_tag=$(echo "$tags" | sed -n '2p')
              if [ -n "$prev_tag" ]; then
                git log "$prev_tag..$tag" --pretty=format:"- %s" --no-merges >> CHANGELOG.md
              else
                git log "$tag" --pretty=format:"- %s" --no-merges >> CHANGELOG.md
              fi
            else
              git log "$tag..$prev" --pretty=format:"- %s" --no-merges >> CHANGELOG.md
            fi

            echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            prev=$tag
          done

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog for ${{ github.event.release.tag_name }}"
          git push origin HEAD:main || echo "Push failed — branch protection may require PR. Changelog generated but not committed."
